# CI multi-OS — aligné pratiques Tauri 2 + Rust stable
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: UI — npm ci + vite build
        run: |
          npm ci --prefix ui
          npm run build --prefix ui

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies (Tauri / WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Préparer runtime Python embarqué (Meross)
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux) TARGET="x86_64-unknown-linux-gnu" ;;
            Windows) TARGET="x86_64-pc-windows-msvc" ;;
            macOS)
              if [[ "$(uname -m)" == "arm64" ]]; then
                TARGET="aarch64-apple-darwin"
              else
                TARGET="x86_64-apple-darwin"
              fi
              ;;
            *) echo "runner non supporté"; exit 1 ;;
          esac
          python scripts/prepare_embedded_python.py --target "$TARGET"

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Tests
        run: cargo test --all-features
