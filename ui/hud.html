<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulKernel HUD</title>
<link rel="stylesheet" href="styles/design-tokens.css">
<script src="vendor/lucide.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);overflow:hidden}
.hud{position:fixed;inset:8px;background:rgba(11,19,32,.92);border:1px solid var(--border);border-radius:8px;padding:.5rem .6rem;pointer-events:none}
body.edit .hud{pointer-events:auto;border-color:var(--cpu);box-shadow:0 0 0 1px rgba(0,229,255,.35),0 8px 24px rgba(0,0,0,.35)}
.hud-title{font-size:.56rem;letter-spacing:.12em;color:var(--cpu);margin-bottom:.35rem;cursor:default;user-select:none;display:flex;align-items:center;gap:.35rem}
.hud-title .pt-ico{width:13px;height:13px;display:inline-flex;color:var(--cpu)}
.hud-title .pt-ico svg{width:13px;height:13px}
body.edit .hud-title{cursor:move}
.hud-badge{font-size:.5rem;color:var(--muted);margin-left:.35rem}
.hud-grid{display:grid;grid-template-columns:1fr 1fr;gap:.24rem .68rem}
.hud-item{font-size:.58rem;line-height:1.35;display:flex;align-items:center;gap:.28rem}
.hud-item .hud-row-ico{color:var(--muted);flex-shrink:0}
.hud-item strong{margin-left:auto;font-weight:600}
.hud.mini .hud-item{font-size:.52rem}
.hud.mini .hud-grid{gap:.12rem .45rem}
.hud.detailed .hud-grid{grid-template-columns:1fr}
.hud.detailed .hud-item{font-size:.62rem}
</style>
</head>
<body>
<div class="hud" id="hudRoot">
  <div class="hud-title" id="hudDrag"><span class="pt-ico"><i data-lucide="panel-top"></i></span> HUD - CRUCIAL <span class="hud-badge" id="hudMode">LOCK</span></div>
  <div class="hud-grid">
    <div class="hud-item"><span class="hud-row-ico"><i data-lucide="orbit"></i></span><span>Dome:</span> <strong id="dome">-</strong></div>
    <div class="hud-item"><span class="hud-row-ico"><i data-lucide="sigma"></i></span><span>Sigma:</span> <strong id="sigma">-</strong></div>
    <div class="hud-item"><span class="hud-row-ico"><i data-lucide="pi"></i></span><span>Pi:</span> <strong id="pi">-</strong></div>
    <div class="hud-item"><span class="hud-row-ico"><i data-lucide="cpu"></i></span><span>CPU:</span> <strong id="cpu">-</strong></div>
    <div class="hud-item"><span class="hud-row-ico"><i data-lucide="memory-stick"></i></span><span>RAM:</span> <strong id="ram">-</strong></div>
    <div class="hud-item"><span class="hud-row-ico"><i data-lucide="crosshair"></i></span><span>Cible:</span> <strong id="target">-</strong></div>
    <div class="hud-item"><span class="hud-row-ico"><i data-lucide="zap"></i></span><span>Power:</span> <strong id="power">-</strong></div>
    <div class="hud-item"><span class="hud-row-ico"><i data-lucide="leaf"></i></span><span>Energie:</span> <strong id="energy">-</strong></div>
  </div>
</div>
<script>
function refreshSoulKernelLucide() {
  try {
    if (typeof lucide !== 'undefined' && lucide.createIcons) {
      lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
    }
  } catch (_) {}
}
refreshSoulKernelLucide();
const t = window.__TAURI__;
const invoke = t?.core?.invoke ? t.core.invoke : null;
const root = document.getElementById('hudRoot');
const mode = document.getElementById('hudMode');
const drag = document.getElementById('hudDrag');
let interactive = false;
let lastDataSig = '';
let lastCfgSig = '';
let lastReadyPing = 0;

function set(id, v){ const el=document.getElementById(id); if(el) el.textContent = v ?? 'N/A'; }
function setPreset(p){
  root.classList.remove('mini','compact','detailed');
  root.classList.add(p === 'mini' ? 'mini' : (p === 'detailed' ? 'detailed' : 'compact'));
}
function setInteractive(on){
  interactive = !!on;
  document.body.classList.toggle('edit', interactive);
  mode.textContent = interactive ? 'EDIT' : 'LOCK';
}
function renderPayload(p){
  set('dome', p.dome); set('sigma', p.sigma); set('pi', p.pi); set('cpu', p.cpu);
  set('ram', p.ram); set('target', p.target); set('power', p.power); set('energy', p.energy);
}

async function refreshHud() {
  if (!invoke) return;
  const now = Date.now();
  if (now - lastReadyPing > 1000) {
    lastReadyPing = now;
    try { await invoke('set_system_hud_ready', { ts_ms: now }); } catch (_) {}
  }
  try {
    const data = await invoke('get_system_hud_data');
    if (data) {
      const sig = JSON.stringify(data);
      if (sig !== lastDataSig) {
        lastDataSig = sig;
        renderPayload(data);
      }
    }
  } catch (_) {}

  try {
    const cfg = await invoke('get_system_hud_config');
    if (cfg) {
      const sig = JSON.stringify(cfg);
      if (sig !== lastCfgSig) {
        lastCfgSig = sig;
        setPreset(cfg.preset);
        setInteractive(!!cfg.interactive);
      }
    }
  } catch (_) {}
}

if (drag && t?.window?.getCurrentWindow) {
  drag.addEventListener('mousedown', async (ev) => {
    if (!interactive || ev.button !== 0) return;
    try { await t.window.getCurrentWindow().startDragging(); } catch (_) {}
  });
}

setPreset('compact');
setInteractive(false);
setInterval(refreshHud, 250);
refreshHud();
</script>
</body>
</html>
